services:
  wger-sparky-sync:
    image: ghcr.io/atechpcs/wger-sparky-bridge:latest
    container_name: wger-sparky-sync
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      WGER_URL: http://wger-nginx:80
      WGER_API_TOKEN: ${WGER_API_TOKEN}
      SPARKY_URL: http://sparkyfitness-server:3010
      SPARKY_API_KEY: ${SPARKY_API_KEY}
      SYNC_CRON: "0 * * * *"
      DATA_DIR: /data
    volumes:
      - sync-data:/data
    networks:
      - wger_default
      - sparkyfitness_default

volumes:
  sync-data:

networks:
  wger_default:
    external: true
  sparkyfitness_default:
    external: true
